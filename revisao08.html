<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        let v = [10, 20, 30, 40];
        let valor = 25;
        let posicao = 2;

        v.push(0); // abre uma posição no final
        
        for (let i = v.length - 1; i > posicao; i--) {
            v[i] = v[i-1];
        }

        v[posicao] = valor;

        console.log(v);
    </script>
</head>
